<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ailo 网页聊天</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-base: #0a0a0f;
      --bg-elevated: #12121a;
      --bg-surface: #18181f;
      --bg-surface-2: #1e1e28;
      --bg-muted: #262630;
      --accent: #7c6ff7;
      --accent-light: #9d8fff;
      --accent-soft: rgba(124, 111, 247, 0.15);
      --accent-user: #5b9eef;
      --accent-user-soft: rgba(91, 158, 239, 0.15);
      --text-primary: #f0f0f5;
      --text-secondary: #9898a8;
      --text-muted: #606070;
      --border: rgba(255,255,255,0.08);
      --border-focus: rgba(124, 111, 247, 0.5);
      --success: #50d68d;
      --error: #f57070;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
      --shadow-md:  32px rgba0 8px(0,0,0,0.4);
    }

    body {
      font-family: 'DM Sans', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      background-image: 
        radial-gradient(ellipse at 20% 0%, rgba(124, 111, 247, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(91, 158, 239, 0.06) 0%, transparent 50%);
    }

    /* Header */
    header {
      background: linear-gradient(180deg, var(--bg-elevated) 0%, rgba(18, 18, 26, 0.95) 100%);
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      backdrop-filter: blur(12px);
      position: relative;
      z-index: 10;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(124, 111, 247, 0.3), transparent);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(124, 111, 247, 0.3);
    }

    .brand-icon svg {
      width: 20px;
      height: 20px;
      color: white;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--text-primary), var(--accent-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .status {
      font-size: 13px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: var(--bg-surface);
      border-radius: 100px;
      border: 1px solid var(--border);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: all 0.3s ease;
    }

    .status-dot.connected {
      background: var(--success);
      box-shadow: 0 0 12px rgba(80, 214, 141, 0.5);
    }

    .status-dot.disconnected {
      background: var(--error);
      box-shadow: 0 0 12px rgba(245, 112, 112, 0.5);
    }

    .status-dot.connecting {
      background: #f5a542;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.9); }
    }

    .user-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--bg-muted), var(--bg-surface-2));
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }

    .user-badge svg {
      width: 16px;
      height: 16px;
      color: var(--accent);
    }

    /* Chat Container */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: none;
      margin: 0;
      width: 100%;
      position: relative;
    }

    #chat-container::-webkit-scrollbar {
      width: 6px;
    }

    #chat-container::-webkit-scrollbar-track {
      background: transparent;
    }

    #chat-container::-webkit-scrollbar-thumb {
      background: var(--bg-muted);
      border-radius: 3px;
    }

    #chat-container::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* Messages */
    .message {
      display: flex;
      gap: 12px;
      max-width: 85%;
      animation: messageIn 0.3s ease;
    }

    @keyframes messageIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
    }

    .message.user .message-avatar {
      background: linear-gradient(135deg, var(--accent-user), #7ab3f5);
      color: white;
    }

    .message.ailo .message-avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      color: white;
    }

    .message-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .message.user .message-content {
      align-items: flex-end;
    }

    .message .sender {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      padding: 0 4px;
    }

    .message-bubble {
      padding: 14px 20px;
      border-radius: var(--radius-lg);
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 15px;
      position: relative;
    }

    .message.user .message-bubble {
      background: linear-gradient(135deg, var(--accent-user) 0%, #6a8fdd 100%);
      color: white;
      border-bottom-right-radius: 6px;
      box-shadow: 0 4px 16px rgba(91, 158, 239, 0.3);
    }

    .message.ailo .message-bubble {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-bottom-left-radius: 6px;
      box-shadow: var(--shadow-sm);
    }

    .message-time {
      font-size: 11px;
      color: var(--text-muted);
      padding: 0 4px;
      opacity: 0.7;
    }

    /* Empty State */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      gap: 20px;
      padding: 60px 20px;
    }

    .empty-state-icon {
      width: 100px;
      height: 100px;
      background: var(--bg-surface);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      position: relative;
    }

    .empty-state-icon::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), transparent);
      opacity: 0.1;
      z-index: -1;
    }

    .empty-state-icon svg {
      width: 44px;
      height: 44px;
      color: var(--text-muted);
      opacity: 0.6;
    }

    .empty-state p {
      font-size: 16px;
      color: var(--text-secondary);
    }

    .empty-state .hint {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* Input Container */
    #input-container {
      background: linear-gradient(180deg, rgba(18, 18, 26, 0.98), var(--bg-elevated));
      padding: 20px 28px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 14px;
      align-items: flex-end;
      backdrop-filter: blur(12px);
      position: relative;
    }

    #input-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 20%;
      right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(124, 111, 247, 0.2), transparent);
    }

    #message-input {
      flex: 1;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      color: var(--text-primary);
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: all 0.2s ease;
      min-height: 52px;
      max-height: 150px;
      line-height: 1.5;
    }

    #message-input::placeholder {
      color: var(--text-muted);
    }

    #message-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(124, 111, 247, 0.15), var(--shadow-sm);
    }

    #send-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--accent), #6a5ff7);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      padding: 16px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 16px rgba(124, 111, 247, 0.4);
    }

    #send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(124, 111, 247, 0.5);
    }

    #send-btn:active {
      transform: translateY(0);
    }

    #send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    #send-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(5, 5, 10, 0.85);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-overlay.hidden {
      display: none;
    }

    .modal {
      background: var(--bg-elevated);
      border-radius: var(--radius-xl);
      padding: 40px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      animation: modalIn 0.4s ease;
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 8px 32px rgba(124, 111, 247, 0.3);
    }

    .modal-icon svg {
      width: 36px;
      height: 36px;
      color: white;
    }

    .modal h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--text-primary), var(--accent-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .modal p {
      color: var(--text-secondary);
      margin-bottom: 28px;
      line-height: 1.6;
      font-size: 15px;
    }

    .modal input {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      color: var(--text-primary);
      font-size: 16px;
      font-family: inherit;
      outline: none;
      margin-bottom: 12px;
      text-align: center;
      transition: all 0.2s ease;
    }

    .modal input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(124, 111, 247, 0.15);
    }

    .modal input::placeholder {
      color: var(--text-muted);
    }

    .modal .hint {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    .modal button {
      background: linear-gradient(135deg, var(--accent), #6a5ff7);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      padding: 16px 40px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(124, 111, 247, 0.4);
    }

    .modal button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(124, 111, 247, 0.5);
    }

    .modal button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <!-- 设置称呼弹窗 -->
  <div class="modal-overlay" id="setup-modal">
    <div class="modal">
      <div class="modal-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <h2>欢迎使用 Ailo</h2>
      <p>请告诉我应该如何称呼你？<br>昵称仅保存在本设备浏览器中。</p>
      <input type="text" id="user-name-input" placeholder="请输入你的称呼" maxlength="20">
      <p class="hint">例如：老板、主人、大侠、居士、师父 等</p>
      <button id="setup-btn" disabled>开始聊天</button>
    </div>
  </div>

  <header>
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <h1>Ailo 智能助手</h1>
    </div>
    <div class="header-right">
      <div class="status">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">连接中...</span>
      </div>
      <div class="user-badge" id="user-badge" style="display: none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span id="user-name-display"></span>
      </div>
    </div>
  </header>

  <div id="chat-container">
    <div class="empty-state" id="empty-state">
      <div class="empty-state-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
        </svg>
      </div>
      <p>发送消息开始对话</p>
      <p class="hint">我会尽力帮助你</p>
    </div>
  </div>

  <div id="input-container">
    <textarea id="message-input" placeholder="输入消息，按 Enter 发送..." rows="1"></textarea>
    <button id="send-btn" title="发送 (Enter)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

  <script>
    const chatContainer = document.getElementById('chat-container');
    const emptyState = document.getElementById('empty-state');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');

    const setupModal = document.getElementById('setup-modal');
    const userNameInput = document.getElementById('user-name-input');
    const setupBtn = document.getElementById('setup-btn');
    const userBadge = document.getElementById('user-badge');
    const userNameDisplay = document.getElementById('user-name-display');

    const STORAGE_KEY = 'ailo_webchat_chat';
    const STORAGE_KEY_NICKNAME = 'ailo_webchat_nickname';
    const MAX_MESSAGES = 200;

    let ws = null;
    let reconnectTimer = null;
    let userName = null;

    function loadNickname() {
      try {
        return localStorage.getItem(STORAGE_KEY_NICKNAME) || null;
      } catch { return null; }
    }

    function saveNickname(name) {
      try {
        localStorage.setItem(STORAGE_KEY_NICKNAME, name);
      } catch (e) { console.warn('saveNickname failed', e); }
    }

    function initNicknameUI() {
      userName = loadNickname();
      if (userName) {
        userNameDisplay.textContent = userName;
        userBadge.style.display = 'inline-flex';
        setupModal.classList.add('hidden');
      } else {
        setupModal.classList.remove('hidden');
        userNameInput.focus();
      }
    }

    function loadFromStorage() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch { return []; }
    }

    function saveToStorage(messages) {
      try {
        const trimmed = messages.length > MAX_MESSAGES ? messages.slice(-MAX_MESSAGES) : messages;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(trimmed));
      } catch (e) { console.warn('saveToStorage failed', e); }
    }

    function getInitials(name) {
      if (!name) return '?';
      return name.charAt(0).toUpperCase();
    }

    function formatTime(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const isToday = date.toDateString() === now.toDateString();
      
      if (isToday) {
        return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      }
      return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }) + ' ' + 
             date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    }

    userNameInput.addEventListener('input', () => {
      setupBtn.disabled = userNameInput.value.trim().length === 0;
    });

    userNameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && userNameInput.value.trim()) {
        setupBtn.click();
      }
    });

    setupBtn.addEventListener('click', () => {
      const name = userNameInput.value.trim();
      if (!name) return;

      saveNickname(name);
      userName = name;
      userNameDisplay.textContent = name;
      userBadge.style.display = 'inline-flex';
      setupModal.classList.add('hidden');
    });

    function connect() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.host}`);

      statusDot.className = 'status-dot connecting';

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.type === 'reply') {
            addMessage('ailo', data.text);
          }
        } catch (err) {
          console.error('Failed to parse message:', err);
        }
      };

      ws.onopen = () => {
        statusDot.className = 'status-dot connected';
        statusText.textContent = '在线';
        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }
        renderFromStorage();
      };

      ws.onclose = () => {
        statusDot.className = 'status-dot disconnected';
        statusText.textContent = '离线';
        reconnectTimer = setTimeout(connect, 3000);
      };

      ws.onerror = () => {
        statusDot.className = 'status-dot disconnected';
        statusText.textContent = '错误';
      };
    }

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

      appendAndSave('user', text, Date.now());
      messageInput.value = '';
      messageInput.style.height = 'auto';

      ws.send(JSON.stringify({ type: 'chat', text, participantName: userName || '用户' }));
    }

    function appendAndSave(sender, text, timestamp) {
      emptyState.style.display = 'none';
      const msgs = loadFromStorage();
      msgs.push({ sender, text, timestamp });
      saveToStorage(msgs);

      const div = document.createElement('div');
      div.className = `message ${sender}`;
      
      const avatarInitials = sender === 'user' ? getInitials(userName) : 'A';
      const senderLabel = sender === 'user' ? (userName || '你') : 'Ailo';
      
      div.innerHTML = `
        <div class="message-avatar">${avatarInitials}</div>
        <div class="message-content">
          <div class="sender">${senderLabel}</div>
          <div class="message-bubble">${escapeHtml(text)}</div>
          <div class="message-time">${formatTime(timestamp)}</div>
        </div>
      `;
      
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function addMessage(sender, text) {
      appendAndSave(sender, text, Date.now());
    }

    function renderFromStorage() {
      const msgs = loadFromStorage();
      if (!msgs.length) return;
      emptyState.style.display = 'none';
      chatContainer.querySelectorAll('.message').forEach(el => el.remove());
      
      for (const m of msgs) {
        const div = document.createElement('div');
        div.className = `message ${m.sender}`;
        
        const avatarInitials = m.sender === 'user' ? getInitials(userName) : 'A';
        const senderLabel = m.sender === 'user' ? (userName || '你') : 'Ailo';
        const timestamp = m.timestamp || Date.now();
        
        div.innerHTML = `
          <div class="message-avatar">${avatarInitials}</div>
          <div class="message-content">
            <div class="sender">${senderLabel}</div>
            <div class="message-bubble">${escapeHtml(m.text ?? m.content ?? '')}</div>
            <div class="message-time">${formatTime(timestamp)}</div>
          </div>
        `;
        chatContainer.appendChild(div);
      }
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    sendBtn.addEventListener('click', sendMessage);

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    messageInput.addEventListener('input', () => {
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + 'px';
    });

    initNicknameUI();
    renderFromStorage();
    connect();
  </script>
</body>
</html>
